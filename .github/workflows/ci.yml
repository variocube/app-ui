name: CI
on: [push, pull_request]
permissions:
  contents: write
  packages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@variocube'
      - run: npm ci
      - run: npm run build
      - run: npm run test
      - run: npm run build:demo
      - if: startsWith(github.ref, 'refs/tags/')
        run: |
          npm version ${GITHUB_REF#refs/*/} --no-git-tag-version
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:-not set}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN length: ${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          OIDC_RESPONSE=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org")
          echo "OIDC response keys: $(echo "$OIDC_RESPONSE" | jq -r 'keys[]')"
          export NODE_AUTH_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value')
          echo "NODE_AUTH_TOKEN length: ${#NODE_AUTH_TOKEN}"
          echo "NODE_AUTH_TOKEN prefix: ${NODE_AUTH_TOKEN:0:20}..."
          npm publish --provenance --access public
      - if: startsWith(github.ref, 'refs/tags/')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build # The folder the action should deploy.

